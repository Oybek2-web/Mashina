{% extends 'base.html' %}

{% block content %}

<a href="{% url 'mashina_create' %}"
   class="btn btn-primary mb-3">
    Add
</a>

<table class="table table-bordered">

    <tr>
        <th>Title</th>
        <th>Description</th>
        <th>Action</th>
    </tr>

    {% for i in mashina %}

    <tr>

        <td>{{ i.title }}</td>

        <td>{{ i.descriptions }}</td>

        <td>

            <a href="{% url 'mashina_update' i.id %}"
               class="btn btn-warning">
                Edit
            </a>

            <a href="{% url 'mashina_delete' i.id %}"
               class="btn btn-danger">
                Delete
            </a>

        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
