<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mashina CRUD</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        .ai-chat-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            z-index: 1000;
            transition: transform 0.3s;
        }

        .ai-chat-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
    </style>
</head>
<body>

    <!-- Asosiy kontent bloki -->
    <div class="container mt-5">
        {% block content %}
        <!-- Boshqa sahifalar shu yerga kontent qo'shadi -->
        {% endblock %}
    </div>

    <!-- AI Yordamchi tugmasi - HAR SAHIFADA KO'RINADI -->
    <button onclick="openAIChat()" class="ai-chat-btn">
        🤖 Yordamchi
    </button>

    <script>
        function openAIChat() {
            window.open('/chat/', 'AI Chat', 'width=800,height=900,resizable=yes,scrollbars=yes');
        }
    </script>

    <!-- Bootstrap JS (ixtiyoriy) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
